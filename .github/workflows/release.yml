name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Build kubeconfigctl CLI for all platforms, update Homebrew formula,
  #    and attach binaries to the GitHub Release.
  # ─────────────────────────────────────────────────────────────────────────────
  kubeconfigctl:
    name: Release kubeconfigctl CLI
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history to push the formula update back to main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Get version
        id: ver
        run: |
          TAG=${GITHUB_REF#refs/tags/}      # v1.2.3
          echo "tag=${TAG}"          >> $GITHUB_OUTPUT
          echo "semver=${TAG#v}"     >> $GITHUB_OUTPUT   # 1.2.3

      - name: Build binaries
        run: |
          VERSION=${{ steps.ver.outputs.tag }}
          COMMIT=${{ github.sha }}
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-w -s -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}"
          mkdir -p dist

          for TARGET in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            OS=${TARGET%/*}
            ARCH=${TARGET#*/}
            GOOS=$OS GOARCH=$ARCH go build -ldflags="${LDFLAGS}" \
              -o "dist/kubeconfigctl-${OS}-${ARCH}" ./cmd/kubeconfigctl
          done

          GOOS=windows GOARCH=amd64 go build -ldflags="${LDFLAGS}" \
            -o dist/kubeconfigctl-windows-amd64.exe ./cmd/kubeconfigctl

      - name: Package archives
        id: pkg
        run: |
          cd dist

          # tar.gz for macOS and Linux (Homebrew standard)
          for f in kubeconfigctl-darwin-arm64 kubeconfigctl-darwin-amd64 \
                    kubeconfigctl-linux-arm64  kubeconfigctl-linux-amd64; do
            tar -czf "${f}.tar.gz" "$f"
          done

          # zip for Windows
          zip kubeconfigctl-windows-amd64.zip kubeconfigctl-windows-amd64.exe

          # Compute SHA256 (used to update the Homebrew formula)
          for arch in darwin-arm64 darwin-amd64 linux-arm64 linux-amd64; do
            key="SHA_${arch//-/_}"
            val=$(sha256sum "kubeconfigctl-${arch}.tar.gz" | cut -d' ' -f1)
            echo "${key^^}=${val}" >> $GITHUB_OUTPUT
          done

      - name: Update Homebrew formula
        run: |
          SEMVER=${{ steps.ver.outputs.semver }}
          sed -i "s|version \".*\"|version \"${SEMVER}\"|" Formula/kubeconfigctl.rb
          sed -i "s|HOMEBREW_SHA256_DARWIN_ARM64|${{ steps.pkg.outputs.SHA_DARWIN_ARM64 }}|" Formula/kubeconfigctl.rb
          sed -i "s|HOMEBREW_SHA256_DARWIN_AMD64|${{ steps.pkg.outputs.SHA_DARWIN_AMD64 }}|" Formula/kubeconfigctl.rb
          sed -i "s|HOMEBREW_SHA256_LINUX_ARM64|${{ steps.pkg.outputs.SHA_LINUX_ARM64 }}|"  Formula/kubeconfigctl.rb
          sed -i "s|HOMEBREW_SHA256_LINUX_AMD64|${{ steps.pkg.outputs.SHA_LINUX_AMD64 }}|"  Formula/kubeconfigctl.rb

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/kubeconfigctl.rb
          git commit -m "chore: update kubeconfigctl formula to ${{ steps.ver.outputs.tag }}"
          git push origin HEAD:main

      - name: Publish GitHub Release (CLI)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/kubeconfigctl-*.tar.gz
            dist/kubeconfigctl-*.zip
          generate_release_notes: false

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Build and push multi-arch operator Docker image to GHCR.
  # ─────────────────────────────────────────────────────────────────────────────
  docker:
    name: Build & Push Operator Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Generates: v1.2.3, 1.2.3, 1.2, 1, latest
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Package and publish Helm chart to GHCR, attach to GitHub Release.
  #    Runs after both docker and kubeconfigctl so the release gets everything.
  # ─────────────────────────────────────────────────────────────────────────────
  helm:
    name: Package & Publish Helm Chart
    runs-on: ubuntu-latest
    needs: [docker, kubeconfigctl]
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Pull the formula commit pushed by the kubeconfigctl job
          ref: main
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Get version (without v prefix for Helm)
        id: ver
        run: echo "semver=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update Chart versions
        run: |
          sed -i "s/^version:.*/version: ${{ steps.ver.outputs.semver }}/" Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ github.ref_name }}\"/" Chart.yaml

      - name: Package Helm chart
        run: helm package . --version ${{ steps.ver.outputs.semver }} --app-version ${{ github.ref_name }}

      - name: Push to GHCR OCI registry
        run: helm push rbac-manager-${{ steps.ver.outputs.semver }}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

      - name: Attach chart to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: rbac-manager-${{ steps.ver.outputs.semver }}.tgz
          generate_release_notes: true
