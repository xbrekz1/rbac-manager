name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # Multi-arch build requires QEMU for arm64 emulation
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generates tags:
      #   ghcr.io/owner/rbac-manager:v1.2.3
      #   ghcr.io/owner/rbac-manager:1.2.3
      #   ghcr.io/owner/rbac-manager:1.2
      #   ghcr.io/owner/rbac-manager:latest
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers between builds using GitHub Actions cache
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    name: Package & Publish Helm Chart
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Get tag version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      # Update chart version to match git tag before packaging
      - name: Update Chart versions
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.tag }}/" Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ github.ref_name }}\"/" Chart.yaml

      - name: Package Helm chart
        run: helm package . --version ${{ steps.version.outputs.tag }} --app-version ${{ github.ref_name }}

      # Push chart to GitHub Container Registry as OCI artifact
      - name: Push Helm chart to GHCR
        run: |
          helm push rbac-manager-${{ steps.version.outputs.tag }}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

      # Also create a GitHub Release with the chart archive attached
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: rbac-manager-${{ steps.version.outputs.tag }}.tgz
          generate_release_notes: true
