name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Build and push multi-arch operator Docker image to GHCR.
  # ─────────────────────────────────────────────────────────────────────────────
  docker:
    name: Build & Push Operator Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Generates: v1.2.3, 1.2.3, 1.2, 1, latest
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      # Build amd64 image locally for scanning — multi-arch load is not supported,
      # so we scan one arch before doing the full push.
      - name: Build image for scanning (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: scan-target:latest
          cache-from: type=gha

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: scan-target:latest
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Fail if CRITICAL vulnerabilities found
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: scan-target:latest
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Package and publish Helm chart to GHCR, attach to GitHub Release.
  # ─────────────────────────────────────────────────────────────────────────────
  helm:
    name: Package & Publish Helm Chart
    runs-on: ubuntu-latest
    needs: [docker]
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Get version (without v prefix for Helm)
        id: ver
        run: echo "semver=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update Chart versions
        run: |
          sed -i "s/^version:.*/version: ${{ steps.ver.outputs.semver }}/" Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ github.ref_name }}\"/" Chart.yaml

      - name: Package Helm chart
        run: helm package . --version ${{ steps.ver.outputs.semver }} --app-version ${{ github.ref_name }}

      - name: Push to GHCR OCI registry
        run: helm push rbac-manager-${{ steps.ver.outputs.semver }}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

      - name: Attach chart to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: rbac-manager-${{ steps.ver.outputs.semver }}.tgz
          generate_release_notes: true
