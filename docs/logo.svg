  <!-- Lock body -->
  <rect x="46" y="58" width="28" height="22" rx="4" fill="#388bfd"/>

  <!-- Keyhole -->
  <circle cx="60" cy="68" r="4.5" fill="#0d1117"/>
  <rect x="57.5" y="68" width="5" height="8" rx="2" fill="#0d1117"/>

  <!-- Text -->
  <text x="114" y="70"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="38" font-weight="700"
        fill="#e6edf3">rbac</text>
  <text x="209" y="70"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="38" font-weight="300"
        fill="#388bfd">-manager</text>

  <!-- Subtitle -->
  <text x="115" y="94"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="12" fill="#6e7681" letter-spacing="2">
    KUBERNETES RBAC OPERATOR
  </text>
