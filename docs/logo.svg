<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 464 130" width="464" height="130">
  <defs>
    <linearGradient id="shieldGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadow" x="-3%" y="-6%" width="108%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#93c5fd" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Card — sized to content with equal 19px margins -->
  <rect width="464" height="130" rx="14" fill="#f0f6ff" filter="url(#cardShadow)"/>
  <rect width="464" height="130" rx="14" fill="#f0f6ff"/>
  <rect width="464" height="130" rx="14" fill="none" stroke="#c7d9f5" stroke-width="1"/>

  <!-- Shield glow — center x=68 -->
  <path d="M68 9 L117 34 L117 80 Q117 109 68 123 Q19 109 19 80 L19 34 Z"
        fill="#3b82f6" opacity="0.2" filter="url(#glow)"/>

  <!-- Shield body -->
  <path d="M68 9 L117 34 L117 80 Q117 109 68 123 Q19 109 19 80 L19 34 Z"
        fill="url(#shieldGrad)"/>

  <!-- Shield top highlight -->
  <path d="M68 13 L113 36 L113 57 Q93 49 68 47 Q43 49 23 57 L23 36 Z"
        fill="white" opacity="0.12"/>

  <!-- Shield border -->
  <path d="M68 9 L117 34 L117 80 Q117 109 68 123 Q19 109 19 80 L19 34 Z"
        fill="none" stroke="#93c5fd" stroke-width="1" opacity="0.5"/>

  <!-- Lock shackle — centered at x=68 -->
  <path d="M57,76 L57,63 Q57,51 68,51 Q79,51 79,63 L79,76"
        fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Lock body -->
  <rect x="53" y="74" width="30" height="24" rx="5" fill="white"/>
  <rect x="53" y="74" width="30" height="24" rx="5"
        fill="none" stroke="#bfdbfe" stroke-width="0.5"/>

  <!-- Keyhole -->
  <circle cx="68" cy="84" r="4" fill="#1d4ed8"/>
  <rect x="65.5" y="84" width="5" height="8" rx="1.5" fill="#1d4ed8"/>

  <!-- Divider — 20px gap after shield right edge (117+20=137) -->
  <line x1="137" y1="24" x2="137" y2="106" stroke="#c7d9f5" stroke-width="1"/>

  <!-- rbac-manager — starts at x=153 (16px after divider) -->
  <text x="153" y="76"
        font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="40">
    <tspan font-weight="700" fill="#0f172a">rbac</tspan><tspan font-weight="300" fill="#2563eb">-manager</tspan>
  </text>

  <!-- Subtitle -->
  <text x="154" y="102"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10.5" fill="#93afd4" letter-spacing="3.5" font-weight="500">KUBERNETES RBAC OPERATOR</text>
</svg>
