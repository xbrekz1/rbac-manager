<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120">
  <!-- Background -->
  <rect width="520" height="120" rx="12" fill="#0d1117"/>

  <!-- Shield -->
  <path d="M30,22 L90,22 L90,64 Q90,94 60,98 Q30,94 30,64 Z"
        fill="none" stroke="#30363d" stroke-width="1.5"/>
  <path d="M37,28 L83,28 L83,62 Q83,87 60,92 Q37,87 37,62 Z"
        fill="#1c2128"/>

  <!-- Lock shackle -->
  <path d="M50,60 L50,51 Q50,42 60,42 Q70,42 70,51 L70,60"
