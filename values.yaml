# Default values for rbac-manager
replicaCount: 1

image:
  repository: ghcr.io/xbrekz1/rbac-manager
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  seccompProfile:
    type: RuntimeDefault

resources:
  limits:
    cpu: 400m
    memory: 256Mi
  requests:
    cpu: 200m
    memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

# Operator configuration
operator:
  # Log level (debug, info, error)
  logLevel: info
  # Enable leader election for HA deployments
  leaderElection: false

# Liveness and readiness probes
livenessProbe:
  enabled: true
  httpGet:
    path: /healthz
    port: 8081
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  enabled: true
  httpGet:
    path: /readyz
    port: 8081
  initialDelaySeconds: 5
  periodSeconds: 10

# Metrics
metrics:
  enabled: true
  port: 8080

# RBAC permissions for the operator
rbac:
  create: true

# Validating webhook configuration.
# Requires TLS — use cert-manager (recommended) or provide caBundle manually.
webhook:
  # Set to true to deploy the ValidatingWebhookConfiguration and webhook Service.
  enabled: false
  # Seconds before the API server times out a webhook call.
  timeoutSeconds: 10
  # cert-manager integration (recommended for production).
  certManager:
    enabled: false
    # Set createSelfSignedIssuer: true for development (self-signed).
    # For production, set to false and provide your own issuerName.
    createSelfSignedIssuer: false
    issuerKind: Issuer
    issuerName: ""
  # Manual TLS: base64-encoded CA bundle injected into ValidatingWebhookConfiguration.
  # Used when certManager.enabled is false. Must be the base64-encoded PEM CA certificate.
  # Example: caBundle: "$(cat ca.crt | base64 -w 0)"
  # caBundle: ""
