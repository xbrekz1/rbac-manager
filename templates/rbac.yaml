---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "rbac-manager.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rbac-manager.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}

{{- if .Values.rbac.create }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "rbac-manager.fullname" . }}
  labels:
    {{- include "rbac-manager.labels" . | nindent 4 }}
rules:
  # AccessGrant CRD — operator's own resource
  - apiGroups: ["rbacmanager.io"]
    resources: ["accessgrants"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbacmanager.io"]
    resources: ["accessgrants/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["rbacmanager.io"]
    resources: ["accessgrants/finalizers"]
    verbs: ["update"]

  # RoleTemplate CRD — read-only, referenced by AccessGrant.spec.roleTemplate.
  # list/watch are required for the controller's Watches(&RoleTemplate{}, ...)
  # informer that triggers AccessGrant reconciles when a template changes.
  - apiGroups: ["rbacmanager.io"]
    resources: ["roletemplates"]
    verbs: ["get", "list", "watch"]

  # ServiceAccount management — operator creates SAs for AccessGrants
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # RBAC resource management.
  # escalate: allows creating Roles with permissions the operator itself doesn't hold.
  # bind:     allows creating RoleBindings for any Role, not just those the operator holds.
  # Both are required for the operator to manage arbitrary RBAC grants.
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "escalate", "bind"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "escalate", "bind"]

  # Namespace read access — needed to verify target namespaces exist before creating Roles
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]

  # Event creation for audit trail
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

  # Lease management for leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "rbac-manager.fullname" . }}
  labels:
    {{- include "rbac-manager.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "rbac-manager.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "rbac-manager.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
