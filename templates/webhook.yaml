{{- if .Values.webhook.enabled }}
---
# Service exposing the webhook server (port 9443 served by controller-runtime).
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rbac-manager.fullname" . }}-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rbac-manager.labels" . | nindent 4 }}
spec:
  ports:
    - port: 443
      targetPort: 9443
      protocol: TCP
      name: webhook
  selector:
    {{- include "rbac-manager.selectorLabels" . | nindent 4 }}

---
# ValidatingWebhookConfiguration — enforces AccessGrant spec correctness at admission time.
# Requires a TLS certificate. Use cert-manager (recommended) or provide certs manually.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "rbac-manager.fullname" . }}
  labels:
    {{- include "rbac-manager.labels" . | nindent 4 }}
  {{- if .Values.webhook.certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "rbac-manager.fullname" . }}-webhook-cert
  {{- end }}
webhooks:
  - name: vaccessgrant.kb.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: {{ include "rbac-manager.fullname" . }}-webhook
        namespace: {{ .Release.Namespace }}
        path: /validate-rbacmanager-io-v1alpha1-accessgrant
      {{- if not .Values.webhook.certManager.enabled }}
      {{- with .Values.webhook.caBundle }}
      caBundle: {{ . }}
      {{- end }}
      {{- end }}
    rules:
      - apiGroups: ["rbacmanager.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["accessgrants"]
        scope: "Namespaced"
    failurePolicy: Fail
    sideEffects: None
    timeoutSeconds: {{ .Values.webhook.timeoutSeconds | default 10 }}

{{- if .Values.webhook.certManager.enabled }}
---
# cert-manager Certificate for the webhook TLS.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "rbac-manager.fullname" . }}-webhook-cert
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rbac-manager.labels" . | nindent 4 }}
spec:
  dnsNames:
    - {{ include "rbac-manager.fullname" . }}-webhook.{{ .Release.Namespace }}.svc
    - {{ include "rbac-manager.fullname" . }}-webhook.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    {{- if .Values.webhook.certManager.createSelfSignedIssuer }}
    kind: Issuer
    name: {{ include "rbac-manager.fullname" . }}-selfsigned
    {{- else }}
    kind: {{ .Values.webhook.certManager.issuerKind | default "Issuer" }}
    name: {{ .Values.webhook.certManager.issuerName }}
    {{- end }}
  secretName: {{ include "rbac-manager.fullname" . }}-webhook-tls

---
{{- if .Values.webhook.certManager.createSelfSignedIssuer }}
# Self-signed Issuer — use only for development/testing.
# In production, replace with your own CA or use ClusterIssuer.
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "rbac-manager.fullname" . }}-selfsigned
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rbac-manager.labels" . | nindent 4 }}
spec:
  selfSigned: {}
{{- end }}
{{- end }}
{{- end }}
