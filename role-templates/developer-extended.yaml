apiVersion: rbacmanager.io/v1alpha1
kind: RoleTemplate
metadata:
  name: developer-extended
  namespace: rbac-manager
  annotations:
    description: "developer + навигация по namespaces в OpenLens + рестарт deployments"
spec:
  needsNamespaceViewer: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "services", "endpoints"]
      verbs: ["get", "list", "watch"]
    - apiGroups: [""]
      resources: ["pods/log"]
      verbs: ["get", "list"]
    - apiGroups: [""]
      resources: ["pods/exec"]
      verbs: ["create"]
    - apiGroups: [""]
      resources: ["configmaps", "secrets"]
      verbs: ["get", "list"]
    - apiGroups: ["apps"]
      resources: ["deployments"]
      verbs: ["get", "list", "watch", "update", "patch"]
    - apiGroups: ["apps"]
      resources: ["statefulsets", "daemonsets", "replicasets"]
      verbs: ["get", "list", "watch"]
    - apiGroups: [""]
      resources: ["events", "persistentvolumeclaims"]
      verbs: ["get", "list", "watch"]
    - apiGroups: ["networking.k8s.io"]
      resources: ["ingresses"]
      verbs: ["get", "list", "watch"]
